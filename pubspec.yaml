# Path: pubspec.yaml
name: mt5_clone
description: A production-grade MetaTrader 5 Android clone.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Core & Architecture
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  dartz: ^0.10.1
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  drift: ^2.17.0
  drift_flutter: any
  sqlite3_flutter_libs: ^0.5.21
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.2.3
  json_annotation: ^4.9.0
  logger: ^2.3.0
  talker: ^4.1.0
  riverpod_annotation: ^2.3.5

  # UI & Charting
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0
  lottie: ^3.1.2
  go_router: ^13.2.4
  intl: ^0.19.0
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  data_table_2: ^2.3.12
  infinite_scroll_pagination: ^4.0.0
  animated_text_kit: ^4.2.2
  flutter_animate: ^4.5.0
  awesome_dialog: ^3.2.1
  fluttertoast: ^9.1.0
  overlay_support: ^2.1.0

  # Native bridge & background
  flutter_foreground_task: ^6.1.1
  wakelock_plus: ^1.1.4
  battery_plus: ^6.0.1
  device_info_plus: ^10.1.0
  permission_handler: ^11.3.1
  file_picker: ^8.0.7
  share_plus: ^12.0.2
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.2.0
  uuid: ^4.4.0
  collection: ^1.18.0
  rxdart: ^0.27.7
  connectivity_plus: ^6.0.3
  dio: ^5.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: any
  riverpod_generator: ^2.4.0
  drift_dev: ^2.17.0
  flutter_lints: ^3.0.1
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
